<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>KAMIL Zon Utara 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#061a14;
color:white;
text-align:center;
}

h1{
color:#FFD700;
font-size:45px;
}

table{
width:85%;
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border-bottom:1px solid #333;
}

th{
background:#0f5132;
}

.johan{
background:#FFD700;
color:black;
font-weight:bold;
}

.naib{
background:#C0C0C0;
color:black;
}

.ketiga{
background:#cd7f32;
}

.scoreboard{
height:300px;
overflow:hidden;
}

.scroll{
animation:scroll 25s linear infinite;
}

@keyframes scroll{
0%{transform:translateY(0)}
100%{transform:translateY(-50%)}
}

.podium{
display:flex;
justify-content:center;
gap:50px;
font-size:40px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>LIVE KAMIL ZON UTARA 2026</h1>

<h2>Keputusan Acara</h2>

<table id="keputusan"></table>

<h2>Podium Pemenang</h2>

<div class="podium">
<div>🥈</div>
<div style="font-size:60px">🥇</div>
<div>🥉</div>
</div>

<h2>Kedudukan Sekolah</h2>

<div class="scoreboard">

<table id="ranking" class="scroll"></table>

</div>

<script>

function loadCSV(url,id){

fetch(url)
.then(res=>res.text())
.then(data=>{

let rows=data.split("\n")
let html=""

rows.forEach((row,i)=>{

let cols=row.split(",")

html+="<tr>"

cols.forEach(col=>{

if(i==0){

html+=`<th>${col}</th>`

}else{

html+=`<td>${col}</td>`

}

})

html+="</tr>"

})

document.getElementById(id).innerHTML=html

})

}

loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vSocxQhTijd8XngTTNS03tPP8poS-FMnMS2Cv9p6bGNl16rBvP8vcuGUHUjNUbGI-I4t7SJezJn_ES6/pubhtml?gid=0&single=true","keputusan")

loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vSocxQhTijd8XngTTNS03tPP8poS-FMnMS2Cv9p6bGNl16rBvP8vcuGUHUjNUbGI-I4t7SJezJn_ES6/pubhtml?gid=539386349&single=true","ranking")

setInterval(function(){

location.reload()

},10000)

</script>

</body>

</html>
